<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atharva Kumkar</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 dark:bg-gray-800 text-black dark:text-black">
    <section class="container grid items-center grid-cols-1 md:grid-cols-2 px-6 py-8">
        <div id="left" class="relative w-full h-[600px] px-10 py-10">
            <img src="_MG_0069.jpg" class="absolute top-10 left-80 h-[550px] rounded-2xl shadow-2xl z-20 hover:scale-105 duration-300 transition-all">

            <img src="_MG_0063.jpg" class="absolute top-20 left-20 h-[450px] rounded-2xl shadow-2xl z-10 brightness-75 hover:brightness-100 hover:scale-105 transition-all duration-300 hover:z-30">
        </div>


    <div id="right">
        <div class="flex h-[650px] w-[500px] aspect-auto rounded-2xl shadow-2xl bg-gray-200 justify-start px-10 py-5">
            <div class="flex flex-col space-y-4 justify-start">
            <h2 class="font-bold text-teal-600 dark:text-teal-500 text-4xl">Contact Me</h2>
            <div class="flex flex-col space-y-1">
            <p class="text-2xl font-bold text-teal-600 dark:text-teal-500">Name:</p>
            <input type="text" class="border-2 rounded-1xl border-teal-800 h-12 w-100 bg-gray-300 rounded-[5px] text-teal-900 font-medium px-2"></input>
            </div>
            <div class="flex flex-col space-y-1">
            <p class="text-2xl font-bold text-teal-600 dark:text-teal-500">Email:</p>
            <input type="text" class="border-2 rounded-1xl border-teal-800 h-12 w-100 bg-gray-300 rounded-[5px] text-teal-900 font-medium px-2"></input>
            </div>
            <div class="flex flex-col space-y-1">
            <p class="text-2xl font-bold text-teal-600 dark:text-teal-500">Contact Number:</p>
            <input type="number" class="border-2 rounded-1xl border-teal-800 h-12 w-100 bg-gray-300 rounded-[5px] text-teal-900 font-medium px-2"></input>
            </div>
            <div class="flex flex-col space-y-1">
            <p class="text-2xl font-bold text-teal-600 dark:text-teal-500">Message:</p>
            <textarea type="text" class="border-2 rounded-1xl border-teal-800 h-30 w-100 bg-gray-300 rounded-[5px] text-teal-900 font-medium px-2 py-2"></textarea>
            </div>
            <div class="py-5">
            <button class="bg-teal-600 text-white font-medium w-100 h-10 rounded-2xl hover:bg-teal-800">Send</button>
            </div>
            </div>
        </div>

    </div>
    </section>
    <footer>
    <p class="flex justify-center py-5 text-teal-800 brightness-50 dark:dark:text-teal-500 dark:brightness-70 font-semibold animate-pulse duration-500">&copy; 2025 Atharva Kumkar. All rights reserved </p>
 </footer>
</body>
